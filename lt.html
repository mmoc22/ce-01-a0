<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub - 开发者社区</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #16162a;
            --bg-card: #1e1e3a;
            --bg-hover: #252550;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.2);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-center {
            display: flex;
            gap: 0.5rem;
        }

        .nav-tab {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.3s;
            border: none;
            background: none;
            font-family: inherit;
        }

        .nav-tab:hover, .nav-tab.active {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 2.5rem 0.5rem 1rem;
            color: var(--text-primary);
            width: 200px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            width: 260px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            transition: background 0.3s;
        }

        .user-menu:hover {
            background: var(--bg-card);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .username {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 主容器 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-secondary);
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
        }

        /* 帖子列表 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .post-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .post-item:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .post-item.pinned {
            border-left: 3px solid var(--warning);
        }

        .post-item.pinned::before {
            content: '📌';
            position: absolute;
            top: 0.75rem;
            right: 1rem;
            font-size: 0.85rem;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .post-author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .post-meta {
            flex: 1;
        }

        .post-author-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .post-author-name .admin-badge {
            font-size: 0.65rem;
            background: var(--warning);
            color: #000;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.4rem;
            font-weight: 600;
        }

        .post-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .post-footer span {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .post-tag {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--accent-light);
            margin-right: 0.5rem;
        }

        /* 帖子详情 */
        .thread-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .thread-main {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .thread-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .thread-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
        }

        .thread-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .thread-action {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
            font-size: 0.9rem;
        }

        .thread-action:hover {
            color: var(--accent-light);
        }

        .thread-action.liked {
            color: var(--danger);
        }

        /* 回复列表 */
        .replies-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .replies-header {
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .reply-item {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border);
        }

        .reply-item:last-child {
            border-bottom: none;
        }

        .reply-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .reply-content {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-left: 2.75rem;
            white-space: pre-wrap;
        }

        .reply-actions {
            display: flex;
            gap: 1rem;
            margin-left: 2.75rem;
            margin-top: 0.75rem;
        }

        .reply-action {
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
        }

        .reply-action:hover {
            color: var(--accent-light);
        }

        /* 编辑器 */
        .editor-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1.5rem;
        }

        .editor-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            line-height: 1.6;
        }

        .editor-box textarea::placeholder {
            color: var(--text-muted);
        }

        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* 个人中心 */
        .profile-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 1rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .profile-role {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-light);
        }

        .profile-stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        /* 隐藏 */
        .hidden { display: none !important; }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-center { display: none; }
            .search-box input { width: 140px; }
            .main-container { padding: 1rem; }
            .thread-main, .replies-section { padding: 1.25rem; }
            .reply-content, .reply-actions { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="router.push('home')">DevHub</div>
            <div class="nav-center">
                <button class="nav-tab active" data-board="all" onclick="boardFilter('all')">全部</button>
                <button class="nav-tab" data-board="tech" onclick="boardFilter('tech')">技术</button>
                <button class="nav-tab" data-board="life" onclick="boardFilter('life')">生活</button>
                <button class="nav-tab" data-board="chat" onclick="boardFilter('chat')">闲聊</button>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索帖子..." onkeyup="handleSearch(event)">
                </div>
                <div id="userSection">
                    <button class="btn btn-primary btn-sm" onclick="showModal('login')">登录</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-container" id="app">
        <!-- 动态渲染 -->
    </div>

    <!-- 发帖模态框 -->
    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <h2>发布新帖</h2>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="postTitle" placeholder="请输入标题..." maxlength="100">
            </div>
            <div class="form-group">
                <label>版块</label>
                <select id="postBoard">
                    <option value="tech">技术</option>
                    <option value="life">生活</option>
                    <option value="chat">闲聊</option>
                </select>
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="postContent" placeholder="分享你的想法..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal('postModal')">取消</button>
                <button class="btn btn-primary" onclick="submitPost()">发布</button>
            </div>
        </div>
    </div>

    <!-- 登录/注册模态框 -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <h2 id="authTitle">登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="authUsername" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="authPassword" placeholder="输入密码">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal('authModal')">取消</button>
                <button class="btn btn-primary" id="authBtn" onclick="handleAuth()">登录</button>
            </div>
            <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--text-muted)">
                <span id="authSwitchText">还没有账号？</span>
                <a href="#" style="color:var(--accent-light)" onclick="toggleAuthMode()">切换</a>
            </p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon"></span>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ==================== 数据层 ====================
        const DB = {
            get(key) {
                const data = localStorage.getItem('devhub_' + key);
                return data ? JSON.parse(data) : null;
            },
            set(key, value) {
                localStorage.setItem('devhub_' + key, JSON.stringify(value));
            },
            init() {
                if (!this.get('users')) {
                    this.set('users', [
                        { id: 1, username: 'admin', password: 'admin', role: 'admin', avatar: 'A', createdAt: Date.now() },
                        { id: 2, username: 'alex', password: '123456', role: 'user', avatar: 'A', createdAt: Date.now() },
                        { id: 3, username: 'bob', password: '123456', role: 'user', avatar: 'B', createdAt: Date.now() }
                    ]);
                }
                if (!this.get('posts')) {
                    this.set('posts', [
                        { id: 1, title: '如何优雅地学习前端框架？', content: '最近想系统学习 React 和 Vue，大家有什么推荐的学习路线吗？\n\n我已经掌握了 HTML/CSS/JS 基础，想深入框架原理。', board: 'tech', authorId: 2, authorName: 'alex', likes: 34, replies: 3, views: 156, pinned: true, createdAt: Date.now() - 86400000 * 2 },
                        { id: 2, title: '周末去爬山了，风景真不错', content: '这周末去了黄山，虽然很累但是风景真的很美！\n\n推荐大家也去体验一下，记得带好装备。', board: 'life', authorId: 3, authorName: 'bob', likes: 21, replies: 1, views: 89, pinned: false, createdAt: Date.now() - 86400000 },
                        { id: 3, title: '大家平时怎么放松的？', content: '工作压力大，想问问大家平时都怎么放松的？\n\n我喜欢打游戏和听音乐，还有什么好建议吗？', board: 'chat', authorId: 2, authorName: 'alex', likes: 15, replies: 2, views: 67, pinned: false, createdAt: Date.now() - 43200000 }
                    ]);
                }
                if (!this.get('replies')) {
                    this.set('replies', [
                        { id: 1, postId: 1, authorId: 3, authorName: 'bob', content: '推荐先学 Vue3，上手更快，然后再看 React。', createdAt: Date.now() - 80000000 },
                        { id: 2, postId: 1, authorId: 1, authorName: 'admin', content: '官方文档是最好的老师，配合实战项目效果更好。', createdAt: Date.now() - 70000000 },
                        { id: 3, postId: 1, authorId: 2, authorName: 'alex', content: '谢谢大家的建议！', createdAt: Date.now() - 60000000 },
                        { id: 4, postId: 2, authorId: 2, authorName: 'alex', content: '羡慕！我也想去。', createdAt: Date.now() - 80000000 },
                        { id: 5, postId: 3, authorId: 3, authorName: 'bob', content: '运动是个好选择，跑步或者游泳都不错。', createdAt: Date.now() - 40000000 },
                        { id: 6, postId: 3, authorId: 1, authorName: 'admin', content: '冥想和阅读也很有效。', createdAt: Date.now() - 30000000 }
                    ]);
                }
                if (!this.get('currentUser')) {
                    this.set('currentUser', null);
                }
                if (!this.get('userLikes')) {
                    this.set('userLikes', {});
                }
            }
        };

        // ==================== 状态管理 ====================
        const state = {
            currentBoard: 'all',
            currentPage: 1,
            pageSize: 10,
            searchQuery: '',
            authMode: 'login' // 'login' | 'register'
        };

        // ==================== 工具函数 ====================
        const utils = {
            formatTime(timestamp) {
                const diff = Date.now() - timestamp;
                const minute = 60000, hour = 3600000, day = 86400000;
                if (diff < minute) return '刚刚';
                if (diff < hour) return Math.floor(diff / minute) + '分钟前';
                if (diff < day) return Math.floor(diff / hour) + '小时前';
                if (diff < day * 7) return Math.floor(diff / day) + '天前';
                return new Date(timestamp).toLocaleDateString('zh-CN');
            },
            getAvatarColor(name) {
                const colors = ['#8b5cf6', '#ec4899', '#06b6d4', '#f59e0b', '#10b981', '#f97316'];
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return colors[Math.abs(hash) % colors.length];
            },
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // ==================== 路由 ====================
        const router = {
            current: 'home',
            params: {},
            push(route, params = {}) {
                this.current = route;
                this.params = params;
                render();
            }
        };

        // ==================== 渲染 ====================
        function render() {
            const app = document.getElementById('app');
            const user = DB.get('currentUser');

            // 更新用户区域
            updateUserSection(user);

            switch (router.current) {
                case 'home':
                    app.innerHTML = renderHome();
                    break;
                case 'thread':
                    app.innerHTML = renderThread(router.params.id);
                    break;
                case 'profile':
                    app.innerHTML = renderProfile(router.params.id);
                    break;
            }
        }

        function updateUserSection(user) {
            const section = document.getElementById('userSection');
            if (user) {
                const color = utils.getAvatarColor(user.username);
                section.innerHTML = `
                    <div class="user-menu" onclick="router.push('profile', {id: ${user.id}})">
                        <div class="avatar" style="background:${color}">${user.username[0].toUpperCase()}</div>
                        <span class="username">${user.username}</span>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="logout()">退出</button>
                `;
            } else {
                section.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showModal('authModal')">登录</button>`;
            }
        }

        function renderHome() {
            const posts = getFilteredPosts();
            const pinned = posts.filter(p => p.pinned);
            const normal = posts.filter(p => !p.pinned);
            const display = [...pinned, ...normal];
            const totalPages = Math.ceil(display.length / state.pageSize) || 1;
            const start = (state.currentPage - 1) * state.pageSize;
            const pagePosts = display.slice(start, start + state.pageSize);

            let html = `
                <div class="page-header">
                    <h1>${getBoardName(state.currentBoard)}</h1>
                    <p>${getBoardDesc(state.currentBoard)}</p>
                </div>
                <div class="action-bar">
                    <div>
                        ${state.searchQuery ? `<span style="color:var(--text-muted)">搜索结果: "${state.searchQuery}"</span>` : ''}
                    </div>
                    <button class="btn btn-primary" onclick="showModal('postModal')">
                        <span>✏️</span> 发布新帖
                    </button>
                </div>
                <div class="post-list">
            `;

            if (pagePosts.length === 0) {
                html += `<div style="text-align:center;padding:4rem;color:var(--text-muted)">暂无帖子</div>`;
            } else {
                pagePosts.forEach(post => {
                    html += renderPostItem(post);
                });
            }

            html += `</div>`;
            html += renderPagination(totalPages);
            return html;
        }

        function renderPostItem(post) {
            const user = DB.get('currentUser');
            const userLikes = DB.get('userLikes') || {};
            const isLiked = user && userLikes[user.id] && userLikes[user.id].includes(post.id);
            const excerpt = post.content.length > 120 ? post.content.substring(0, 120) + '...' : post.content;

            return `
                <div class="post-item ${post.pinned ? 'pinned' : ''}" onclick="router.push('thread', {id: ${post.id}})">
                    <div class="post-header">
                        <div class="post-author-avatar" style="background:${utils.getAvatarColor(post.authorName)}">${post.authorName[0].toUpperCase()}</div>
                        <div class="post-meta">
                            <div class="post-author-name">
                                ${utils.escapeHtml(post.authorName)}
                                ${post.authorName === 'admin' ? '<span class="admin-badge">管理员</span>' : ''}
                            </div>
                            <div class="post-time">${utils.formatTime(post.createdAt)}</div>
                        </div>
                    </div>
                    <div class="post-title">${utils.escapeHtml(post.title)}</div>
                    <div class="post-excerpt">${utils.escapeHtml(excerpt)}</div>
                    <div class="post-footer">
                        <span class="post-tag">${getBoardName(post.board)}</span>
                        <span>💬 ${post.replies}</span>
                        <span class="${isLiked ? 'liked' : ''}">❤️ ${post.likes}</span>
                        <span>👁️ ${post.views}</span>
                    </div>
                </div>
            `;
        }

        function renderThread(postId) {
            const posts = DB.get('posts') || [];
            const post = posts.find(p => p.id === postId);
            if (!post) return '<div>帖子不存在</div>';

            // 增加浏览量
            post.views++;
            DB.set('posts', posts);

            const replies = (DB.get('replies') || []).filter(r => r.postId === postId);
            const user = DB.get('currentUser');
            const userLikes = DB.get('userLikes') || {};
            const isLiked = user && userLikes[user.id] && userLikes[user.id].includes(post.id);

            let html = `
                <div class="thread-container">
                    <button class="btn btn-secondary btn-sm" onclick="router.push('home')" style="margin-bottom:1rem">
                        ← 返回列表
                    </button>
                    <div class="thread-main">
                        <div class="post-header">
                            <div class="post-author-avatar" style="background:${utils.getAvatarColor(post.authorName)};width:44px;height:44px;font-size:1rem">${post.authorName[0].toUpperCase()}</div>
                            <div class="post-meta">
                                <div class="post-author-name">
                                    ${utils.escapeHtml(post.authorName)}
                                    ${post.authorName === 'admin' ? '<span class="admin-badge">管理员</span>' : ''}
                                </div>
                                <div class="post-time">${utils.formatTime(post.createdAt)} · ${getBoardName(post.board)}</div>
                            </div>
                        </div>
                        <div class="thread-title">${utils.escapeHtml(post.title)}</div>
                        <div class="thread-content">${utils.escapeHtml(post.content)}</div>
                        <div class="thread-actions">
                            <div class="thread-action ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id}, event)">
                                <span>${isLiked ? '❤️' : '🤍'}</span>
                                <span>${post.likes}</span>
                            </div>
                            <div class="thread-action">
                                <span>💬</span>
                                <span>${post.replies}</span>
                            </div>
                            <div class="thread-action">
                                <span>👁️</span>
                                <span>${post.views}</span>
                            </div>
                            ${user && user.role === 'admin' ? `
                                <div class="thread-action" onclick="deletePost(${post.id}, event)" style="color:var(--danger)">
                                    <span>🗑️</span>
                                    <span>删除</span>
                                </div>
                                <div class="thread-action" onclick="togglePin(${post.id}, event)">
                                    <span>📌</span>
                                    <span>${post.pinned ? '取消置顶' : '置顶'}</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="replies-section">
                        <div class="replies-header">${replies.length} 条回复</div>
                        ${replies.map(reply => renderReply(reply)).join('')}
                        ${user ? `
                            <div class="editor-box">
                                <textarea id="replyContent" placeholder="写下你的回复..."></textarea>
                                <div class="editor-footer">
                                    <span style="color:var(--text-muted);font-size:0.8rem">支持换行</span>
                                    <button class="btn btn-primary btn-sm" onclick="submitReply(${post.id})">回复</button>
                                </div>
                            </div>
                        ` : '<p style="text-align:center;color:var(--text-muted);padding:1rem">登录后即可回复</p>'}
                    </div>
                </div>
            `;
            return html;
        }

        function renderReply(reply) {
            const user = DB.get('currentUser');
            return `
                <div class="reply-item" id="reply-${reply.id}">
                    <div class="reply-header">
                        <div class="post-author-avatar" style="background:${utils.getAvatarColor(reply.authorName)};width:32px;height:32px;font-size:0.75rem">${reply.authorName[0].toUpperCase()}</div>
                        <div class="post-meta">
                            <div class="post-author-name" style="font-size:0.85rem">
                                ${utils.escapeHtml(reply.authorName)}
                                ${reply.authorName === 'admin' ? '<span class="admin-badge">管理员</span>' : ''}
                            </div>
                            <div class="post-time" style="font-size:0.75rem">${utils.formatTime(reply.createdAt)}</div>
                        </div>
                    </div>
                    <div class="reply-content">${utils.escapeHtml(reply.content)}</div>
                    <div class="reply-actions">
                        ${user && user.role === 'admin' ? `
                            <span class="reply-action" onclick="deleteReply(${reply.id})" style="color:var(--danger)">删除</span>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderProfile(userId) {
            const users = DB.get('users') || [];
            const profileUser = users.find(u => u.id === userId);
            if (!profileUser) return '<div>用户不存在</div>';

            const posts = (DB.get('posts') || []).filter(p => p.authorId === userId);
            const replies = (DB.get('replies') || []).filter(r => r.authorId === userId);
            const currentUser = DB.get('currentUser');

            let html = `
                <div style="max-width:800px;margin:0 auto">
                    <button class="btn btn-secondary btn-sm" onclick="router.push('home')" style="margin-bottom:1rem">
                        ← 返回
                    </button>
                    <div class="profile-header">
                        <div class="profile-avatar-large" style="background:${utils.getAvatarColor(profileUser.username)}">${profileUser.username[0].toUpperCase()}</div>
                        <div class="profile-name">${utils.escapeHtml(profileUser.username)}</div>
                        <div class="profile-role">${profileUser.role === 'admin' ? '👑 管理员' : '👤 普通用户'}</div>
                        <div class="profile-stats">
                            <div class="profile-stat">
                                <div class="profile-stat-value">${posts.length}</div>
                                <div class="profile-stat-label">发帖</div>
                            </div>
                            <div class="profile-stat">
                                <div class="profile-stat-value">${replies.length}</div>
                                <div class="profile-stat-label">回复</div>
                            </div>
                            <div class="profile-stat">
                                <div class="profile-stat-value">${utils.formatTime(profileUser.createdAt).replace(/前$/, '').replace(/天前/, '天')}</div>
                                <div class="profile-stat-label">加入</div>
                            </div>
                        </div>
                    </div>

                    <h3 style="margin-bottom:1rem">最近发帖</h3>
                    <div class="post-list">
                        ${posts.length === 0 ? '<p style="color:var(--text-muted)">还没有发过帖</p>' : 
                            posts.slice(0, 5).map(p => renderPostItem(p)).join('')}
                    </div>
                </div>
            `;
            return html;
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) return '';
            let html = '<div class="pagination">';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === state.currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            html += '</div>';
            return html;
        }

        // ==================== 业务逻辑 ====================
        function getFilteredPosts() {
            let posts = DB.get('posts') || [];
            if (state.currentBoard !== 'all') {
                posts = posts.filter(p => p.board === state.currentBoard);
            }
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                posts = posts.filter(p => 
                    p.title.toLowerCase().includes(q) || 
                    p.content.toLowerCase().includes(q) ||
                    p.authorName.toLowerCase().includes(q)
                );
            }
            return posts.sort((a, b) => {
                if (a.pinned !== b.pinned) return b.pinned - a.pinned;
                return b.createdAt - a.createdAt;
            });
        }

        function getBoardName(board) {
            const names = { all: '全部帖子', tech: '技术交流', life: '生活分享', chat: '闲聊灌水' };
            return names[board] || board;
        }

        function getBoardDesc(board) {
            const descs = {
                all: '浏览所有版块的最新讨论',
                tech: '前端、后端、AI、工具等技术话题',
                life: '旅行、美食、摄影、日常分享',
                chat: '轻松闲聊，畅所欲言'
            };
            return descs[board] || '';
        }

        function boardFilter(board) {
            state.currentBoard = board;
            state.currentPage = 1;
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.board === board);
            });
            render();
        }

        function goPage(page) {
            state.currentPage = page;
            render();
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                state.searchQuery = e.target.value.trim();
                state.currentPage = 1;
                render();
            }
        }

        // ==================== 发帖 ====================
        function submitPost() {
            const user = DB.get('currentUser');
            if (!user) { showToast('请先登录', 'error'); return; }

            const title = document.getElementById('postTitle').value.trim();
            const board = document.getElementById('postBoard').value;
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) { showToast('标题和内容不能为空', 'error'); return; }

            const posts = DB.get('posts') || [];
            const newPost = {
                id: Date.now(),
                title,
                content,
                board,
                authorId: user.id,
                authorName: user.username,
                likes: 0,
                replies: 0,
                views: 0,
                pinned: false,
                createdAt: Date.now()
            };

            posts.unshift(newPost);
            DB.set('posts', posts);

            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            hideModal('postModal');
            showToast('发布成功！', 'success');
            render();
        }

        // ==================== 回复 ====================
        function submitReply(postId) {
            const user = DB.get('currentUser');
            if (!user) { showToast('请先登录', 'error'); return; }

            const content = document.getElementById('replyContent').value.trim();
            if (!content) { showToast('回复内容不能为空', 'error'); return; }

            const replies = DB.get('replies') || [];
            const newReply = {
                id: Date.now(),
                postId,
                authorId: user.id,
                authorName: user.username,
                content,
                createdAt: Date.now()
            };

            replies.push(newReply);
            DB.set('replies', replies);

            // 更新帖子回复数
            const posts = DB.get('posts') || [];
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.replies = replies.filter(r => r.postId === postId).length;
                DB.set('posts', posts);
            }

            document.getElementById('replyContent').value = '';
            showToast('回复成功', 'success');
            render();
        }

        // ==================== 点赞 ====================
        function toggleLike(postId, event) {
            event.stopPropagation();
            const user = DB.get('currentUser');
            if (!user) { showToast('请先登录', 'error'); return; }

            const userLikes = DB.get('userLikes') || {};
            if (!userLikes[user.id]) userLikes[user.id] = [];

            const posts = DB.get('posts') || [];
            const post = posts.find(p => p.id === postId);

            if (userLikes[user.id].includes(postId)) {
                userLikes[user.id] = userLikes[user.id].filter(id => id !== postId);
                post.likes--;
                showToast('取消点赞', 'success');
            } else {
                userLikes[user.id].push(postId);
                post.likes++;
                showToast('点赞成功', 'success');
            }

            DB.set('userLikes', userLikes);
            DB.set('posts', posts);
            render();
        }

        // ==================== 管理员操作 ====================
        function deletePost(postId, event) {
            event.stopPropagation();
            if (!confirm('确定删除这个帖子吗？')) return;

            let posts = DB.get('posts') || [];
            posts = posts.filter(p => p.id !== postId);
            DB.set('posts', posts);

            let replies = DB.get('replies') || [];
            replies = replies.filter(r => r.postId !== postId);
            DB.set('replies', replies);

            showToast('帖子已删除', 'success');
            router.push('home');
        }

        function togglePin(postId, event) {
            event.stopPropagation();
            const posts = DB.get('posts') || [];
            const post = posts.find(p => p.id === postId);
            post.pinned = !post.pinned;
            DB.set('posts', posts);
            showToast(post.pinned ? '已置顶' : '已取消置顶', 'success');
            render();
        }

        function deleteReply(replyId) {
            if (!confirm('确定删除这条回复吗？')) return;

            let replies = DB.get('replies') || [];
            const reply = replies.find(r => r.id === replyId);
            replies = replies.filter(r => r.id !== replyId);
            DB.set('replies', replies);

            // 更新帖子回复数
            const posts = DB.get('posts') || [];
            const post = posts.find(p => p.id === reply.postId);
            if (post) {
                post.replies = replies.filter(r => r.postId === reply.postId).length;
                DB.set('posts', posts);
            }

            showToast('回复已删除', 'success');
            render();
        }

        // ==================== 用户认证 ====================
        function toggleAuthMode() {
            state.authMode = state.authMode === 'login' ? 'register' : 'login';
            document.getElementById('authTitle').textContent = state.authMode === 'login' ? '登录' : '注册';
            document.getElementById('authBtn').textContent = state.authMode === 'login' ? '登录' : '注册';
            document.getElementById('authSwitchText').textContent = state.authMode === 'login' ? '还没有账号？' : '已有账号？';
        }

        function handleAuth() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (!username || !password) { showToast('请填写完整信息', 'error'); return; }

            const users = DB.get('users') || [];

            if (state.authMode === 'login') {
                const user = users.find(u => u.username === username && u.password === password);
                if (!user) { showToast('用户名或密码错误', 'error'); return; }
                DB.set('currentUser', user);
                showToast('登录成功！', 'success');
            } else {
                if (users.find(u => u.username === username)) { showToast('用户名已存在', 'error'); return; }
                const newUser = {
                    id: Date.now(),
                    username,
                    password,
                    role: 'user',
                    avatar: username[0].toUpperCase(),
                    createdAt: Date.now()
                };
                users.push(newUser);
                DB.set('users', users);
                DB.set('currentUser', newUser);
                showToast('注册成功！', 'success');
            }

            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            hideModal('authModal');
            render();
        }

        function logout() {
            DB.set('currentUser', null);
            showToast('已退出登录', 'success');
            render();
        }

        // ==================== UI 辅助 ====================
        function showModal(id) {
            document.getElementById(id).classList.add('active');
            if (id === 'authModal') {
                state.authMode = 'login';
                document.getElementById('authTitle').textContent = '登录';
                document.getElementById('authBtn').textContent = '登录';
            }
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        });

        // ==================== 初始化 ====================
        DB.init();
        render();
    </script>

</body>
</html>
