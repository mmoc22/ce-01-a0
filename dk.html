<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡 - Daily Check-in</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #16181c;
            --bg-secondary: #1e2026;
            --bg-tertiary: #252730;
            --bg-card: #2b2d35;
            --bg-hover: #32343e;
            --text-primary: #e0e0e0;
            --text-secondary: #8b8d93;
            --text-muted: #5c5f66;
            --accent: #ff3a3a;
            --accent-hover: #ff5252;
            --accent-light: #ff6b6b;
            --border: #2f3139;
            --success: #4caf50;
            --warning: #ff9800;
            --gradient-start: #ff3a3a;
            --gradient-end: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 200px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .nav-section { margin-bottom: 24px; }
        .nav-title {
            padding: 0 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .nav-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-hover);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .nav-item svg {
            width: 18px; height: 18px;
            opacity: 0.8;
        }

        .main-content {
            margin-left: 200px;
            flex: 1;
            padding: 0;
        }

        .header {
            background: var(--bg-secondary);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title { font-size: 20px; font-weight: 600; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .streak-badge {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .page {
            display: none;
            padding: 32px;
            max-width: 1200px;
            animation: fadeIn 0.3s ease;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 打卡页面 */
        .checkin-hero {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .checkin-hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,58,58,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .checkin-btn {
            position: relative;
            width: 140px; height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(255,58,58,0.4);
            transition: all 0.3s;
            z-index: 1;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .checkin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(255,58,58,0.5);
        }

        .checkin-btn:active { transform: scale(0.95); }

        .checkin-btn.checked {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            box-shadow: 0 8px 32px rgba(76,175,80,0.4);
            cursor: default;
        }

        .checkin-btn .btn-text { font-size: 16px; }
        .checkin-btn .btn-sub {
            font-size: 11px;
            opacity: 0.9;
            font-weight: 400;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .habit-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .habit-item:hover { background: var(--bg-hover); }

        .habit-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .habit-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--bg-tertiary);
        }

        .habit-details h3 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .habit-details p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .habit-check {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: transparent;
        }

        .habit-check:hover { border-color: var(--accent); }

        .habit-check.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .habit-check.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .add-habit-btn {
            background: var(--bg-tertiary);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-top: 12px;
        }

        .add-habit-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ============ 转盘页面 ============ */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 8px var(--bg-secondary),
                0 0 0 10px var(--border),
                0 0 60px rgba(255,58,58,0.15);
            transition: transform 0s;
        }

        /* 使用 conic-gradient 作为背景实现完整圆形 */
        .wheel-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 0;
            transform-origin: 0% 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 16px;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        .wheel-segment-text {
            font-size: 13px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transform-origin: center;
        }

        .wheel-segment-text .seg-icon { font-size: 20px; }
        .wheel-segment-text .seg-name { font-size: 12px; }

        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: var(--bg-primary);
            border-radius: 50%;
            border: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .wheel-center:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .wheel-pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid var(--accent);
            z-index: 20;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .spin-btn {
            margin-top: 36px;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(255,58,58,0.3);
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255,58,58,0.4);
        }

        .spin-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .spin-info {
            margin-top: 16px;
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .spin-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spin-info .count {
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
        }

        .prize-history {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
        }

        .prize-list {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            max-height: 220px;
            overflow-y: auto;
        }

        .prize-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .prize-item:last-child { border-bottom: none; }

        /* 自定义转盘内容 */
        .wheel-config {
            margin-top: 32px;
            width: 100%;
            max-width: 500px;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .wheel-config h3 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wheel-items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            max-height: 240px;
            overflow-y: auto;
        }

        .wheel-item-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 10px 12px;
            border-radius: 10px;
        }

        .wheel-item-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .wheel-item-row .item-emoji {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .wheel-item-row .item-emoji:hover { background: var(--bg-hover); }

        .wheel-item-row .item-color {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
        }

        .wheel-item-row .item-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .wheel-item-row .item-remove:hover { color: var(--accent); }

        .add-wheel-item {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .add-wheel-item:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .color-picker-popover {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px solid var(--border);
            position: absolute;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .color-option {
            width: 28px; height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.2);
            border-color: white;
        }

        /* 日历页面 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .calendar-nav button {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .calendar-nav button:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .calendar-grid {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .weekday {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            padding: 8px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
        }

        .calendar-day:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .calendar-day.other-month {
            color: var(--text-muted);
            background: transparent;
        }

        .calendar-day.today {
            border: 2px solid var(--accent);
            font-weight: 700;
        }

        .calendar-day.checked {
            background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(76,175,80,0.1));
            border-color: var(--success);
        }

        .calendar-day.checked::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--success);
        }

        .day-number {
            font-size: 14px;
            font-weight: 500;
        }

        .calendar-day.checked .day-number { color: var(--success); }

        .calendar-legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal { transform: scale(1); }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .modal-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255,58,58,0.3);
        }

        .habit-input-modal input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }

        .habit-input-modal input:focus { border-color: var(--accent); }

        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .emoji-option {
            font-size: 24px;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
        }

        .emoji-option:hover, .emoji-option.selected {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 12px 0;
            }

            .nav-section {
                display: flex;
                overflow-x: auto;
                margin-bottom: 0;
                padding: 0 12px;
            }

            .nav-title { display: none; }

            .nav-item {
                white-space: nowrap;
                border-left: none;
                border-bottom: 2px solid transparent;
            }

            .nav-item.active {
                border-left: none;
                border-bottom-color: var(--accent);
            }

            .main-content { margin-left: 0; }

            .wheel-wrapper {
                width: 300px;
                height: 300px;
            }

            .header { padding: 12px 16px; }
            .page { padding: 16px; }
            .checkin-hero { padding: 24px; }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @keyframes checkinPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .checkin-pop { animation: checkinPop 0.5s ease; }

        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">📅</div>
                <span>每日打卡</span>
            </div>
            <div class="nav-section">
                <div class="nav-title">菜单</div>
                <div class="nav-item active" onclick="showPage('checkin')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    今日打卡
                </div>
                <div class="nav-item" onclick="showPage('wheel')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    幸运转盘
                </div>
                <div class="nav-item" onclick="showPage('calendar')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    打卡日历
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 class="header-title" id="pageTitle">今日打卡</h1>
                <div class="user-info">
                    <div class="streak-badge">
                        🔥 <span id="streakCount">0</span> 天连续
                    </div>
                    <div class="avatar">我</div>
                </div>
            </header>

            <!-- 打卡页面 -->
            <div class="page active" id="page-checkin">
                <div class="checkin-hero">
                    <h2 style="font-size: 24px; margin-bottom: 8px; position: relative; z-index: 1;">今日打卡</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 20px; position: relative; z-index: 1;" id="dateDisplay"></p>
                    <button class="checkin-btn" id="mainCheckinBtn" onclick="doCheckin()">
                        <span class="btn-text">点击打卡</span>
                        <span class="btn-sub">开启美好一天</span>
                    </button>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">本月打卡</div>
                        <div class="stat-value"><span id="monthCount">0</span><span class="stat-unit">天</span></div>
                    </div>
                    <div class="stat-card">

                        <div class="stat-value"><span id="totalCount">0</span><span class="stat-unit">天</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">完成率</div>

                <div class="section-title">

            <!-- 转盘页面 -->
            <div class="page" id="page-wheel">
                <div class="wheel-container">
                    <div class="wheel-wrapper">

                        <div class="wheel" id="wheel"></div>
                        <div class="wheel-center" onclick="spinWheel()" title="点击抽奖">
                            <span style="font-size: 20px;">🎯</span>

                    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
                        开始抽奖

                    <div class="spin-info">
                        <span>今日基础: <span class="count" id="spinCountBase">1</span> 次</span>
                        <span>打卡奖励: <span class="count" id="spinCountBonus">0</span> 次</span>

                    <div class="wheel-config">

            <!-- 日历页面 -->
            <div class="page" id="page-calendar">

                    <h2 id="calendarMonth" style="font-size: 20px; font-weight: 600;"></h2>
                    <div class="calendar-nav">
                        <button onclick="changeMonth(-1)">◀ 上月</button>
                        <button onclick="goToToday()">今天</button>
                        <button onclick="changeMonth(1)">下月 ▶</button>

                <div class="calendar-grid">
                    <div class="calendar-weekdays">
                        <div class="weekday">日</div>
                        <div class="weekday">一</div>
                        <div class="weekday">二</div>
                        <div class="weekday">三</div>
                        <div class="weekday">四</div>
                        <div class="weekday">五</div>
                        <div class="weekday">六</div>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>
                <div class="calendar-legend">
                    <div class="legend-item">
                        <div class="legend-dot" style="background: var(--success);"></div>
                        已打卡

                        今天

    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 id="modalTitle">恭喜！</h2>
            <p id="modalText">打卡成功！</p>
            <button class="modal-btn" onclick="closeModal()">知道了</button>
        </div>
    </div>

    <!-- 添加习惯弹窗 -->
    <div class="modal-overlay" id="addHabitModal">
        <div class="modal habit-input-modal">
            <h2 style="margin-bottom: 20px;">添加新习惯</h2>
            <input type="text" id="newHabitName" placeholder="输入习惯名称（如：喝水、阅读）" maxlength="20">
            <div style="margin-bottom: 12px; text-align: left; color: var(--text-secondary); font-size: 12px;">选择图标：</div>
            <div class="emoji-picker" id="emojiPicker"></div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="modal-btn" style="background: var(--bg-tertiary);" onclick="closeAddHabitModal()">取消</button>
                <button class="modal-btn" onclick="addHabit()">添加</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据存储 ====================
        const Storage = {
            get(key, defaultValue = null) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : defaultValue;
                } catch { return defaultValue; }
            },
            set(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
            }
        };

        // ==================== 状态管理 ====================
        let state = {
            checkins: Storage.get('checkins', {}),
            habits: Storage.get('habits', [
                { id: 1, name: '早起', icon: '🌅', checked: false },
                { id: 2, name: '喝水', icon: '💧', checked: false },
                { id: 3, name: '运动', icon: '🏃', checked: false },
                { id: 4, name: '阅读', icon: '📚', checked: false }
            ]),
            streak: Storage.get('streak', 0),
            lastCheckin: Storage.get('lastCheckin', null),
            prizes: Storage.get('prizes', []),
            spinBaseUsed: Storage.get('spinBaseUsed', false),
            spinBonusCount: Storage.get('spinBonusCount', 0),
            spinBonusUsed: Storage.get('spinBonusUsed', 0),
            lastSpinResetDate: Storage.get('lastSpinResetDate', null),
            wheelItems: Storage.get('wheelItems', [
                { name: '积分 +10', emoji: '⭐', color: '#ff3a3a' },
                { name: '积分 +50', emoji: '🌟', color: '#ff6b6b' },
                { name: '再接再厉', emoji: '💪', color: '#ff9800' },
                { name: '积分 +20', emoji: '🎁', color: '#4caf50' },
                { name: '超级大奖', emoji: '👑', color: '#e91e63' },
                { name: '积分 +5', emoji: '💎', color: '#2196f3' },
                { name: '好运连连', emoji: '🍀', color: '#9c27b0' },
                { name: '积分 +30', emoji: '🔥', color: '#00bcd4' }
            ])
        };

        const emojis = ['✨', '💪', '📚', '💧', '🌅', '🏃', '🧘', '🎸', '💻', '🥗', '😴', '🎯'];
        const colorPalette = [
            '#ff3a3a', '#ff6b6b', '#ff9800', '#ffc107', '#4caf50',
            '#8bc34a', '#00bcd4', '#2196f3', '#3f51b5', '#9c27b0',
            '#e91e63', '#795548', '#607d8b', '#009688', '#ff5722'
        ];

        // ==================== 初始化 ====================
        function init() {
            checkDailyReset();
            updateDateDisplay();
            renderHabits();
            updateStats();
            initWheel();
            renderWheelConfig();
            renderCalendar();
            renderEmojiPicker();
            updateSpinDisplay();
        }

        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function checkDailyReset() {
            const today = getTodayStr();
            if (state.lastSpinResetDate !== today) {
                state.spinBaseUsed = false;
                state.spinBonusCount = 0;
                state.spinBonusUsed = 0;
                state.lastSpinResetDate = today;
                Storage.set('spinBaseUsed', false);
                Storage.set('spinBonusCount', 0);
                Storage.set('spinBonusUsed', 0);
                Storage.set('lastSpinResetDate', today);
            }
        }

        function updateDateDisplay() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // ==================== 页面切换 ====================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
            const titles = { checkin: '今日打卡', wheel: '幸运转盘', calendar: '打卡日历' };
            document.getElementById('pageTitle').textContent = titles[pageName];
            if (pageName === 'calendar') renderCalendar();
            if (pageName === 'wheel') {
                initWheel();
                updateSpinDisplay();
            }
        }

        // ==================== 打卡功能 ====================
        function doCheckin() {
            const today = getTodayStr();
            if (state.checkins[today]) {
                showModal('😊', '今日已打卡', '明天再来吧！');
                return;
            }

            state.checkins[today] = {
                date: today,
                habits: state.habits.map(h => ({ ...h })),
                timestamp: Date.now()
            };

            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            if (state.lastCheckin === yesterdayStr) {
                state.streak++;
            } else if (state.lastCheckin !== today) {
                state.streak = 1;
            }
            state.lastCheckin = today;

            state.spinBonusCount++;
            Storage.set('spinBonusCount', state.spinBonusCount);
            Storage.set('checkins', state.checkins);
            Storage.set('streak', state.streak);
            Storage.set('lastCheckin', state.lastCheckin);

            const btn = document.getElementById('mainCheckinBtn');
            btn.classList.add('checked', 'checkin-pop');
            btn.innerHTML = '<span class="btn-text">已打卡</span><span class="btn-sub">明日继续</span>';

            createConfetti();
            updateStats();
            updateSpinDisplay();
            showModal('🎉', '打卡成功！', `连续打卡 ${state.streak} 天，获得 1 次转盘机会！`);
        }

        function toggleHabit(id) {
            const habit = state.habits.find(h => h.id === id);
            if (habit) {
                habit.checked = !habit.checked;
                Storage.set('habits', state.habits);
                renderHabits();
            }
        }

        function renderHabits() {
            const container = document.getElementById('habitList');
            container.innerHTML = state.habits.map(habit => `
                <div class="habit-item">
                    <div class="habit-info">
                        <div class="habit-icon">${habit.icon}</div>
                        <div class="habit-details">
                            <h3>${habit.name}</h3>
                            <p>每日习惯</p>
                        </div>
                    </div>
                    <div class="habit-check ${habit.checked ? 'checked' : ''}" onclick="toggleHabit(${habit.id})"></div>
                </div>
            `).join('');

            const today = getTodayStr();
            const btn = document.getElementById('mainCheckinBtn');
            if (state.checkins[today]) {
                btn.classList.add('checked');
                btn.innerHTML = '<span class="btn-text">已打卡</span><span class="btn-sub">明日继续</span>';
            }
        }

        function updateStats() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let monthCount = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (state.checkins[dateStr]) monthCount++;
            }
            const totalCount = Object.keys(state.checkins).length;
            const completionRate = Math.round((monthCount / daysInMonth) * 100);
            document.getElementById('monthCount').textContent = monthCount;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('completionRate').textContent = completionRate;
            document.getElementById('streakCount').textContent = state.streak;
        }

        // ==================== 转盘功能（使用SVG实现完美圆形）====================
        function initWheel() {
            const wheel = document.getElementById('wheel');
            const items = state.wheelItems;
            const count = items.length;
            const anglePerSegment = 360 / count;
            const radius = 200; // 半径
            const center = radius;

            // 使用 SVG 绘制完美的扇形转盘
            let svgContent = `<svg width="100%" height="100%" viewBox="0 0 ${radius*2} ${radius*2}">`;

            for (let i = 0; i < count; i++) {
                const startAngle = i * anglePerSegment - 90; // -90 从顶部开始
                const endAngle = (i + 1) * anglePerSegment - 90;

                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;

                const x1 = center + radius * Math.cos(startRad);
                const y1 = center + radius * Math.sin(startRad);
                const x2 = center + radius * Math.cos(endRad);
                const y2 = center + radius * Math.sin(endRad);

                // 扇形路径
                const largeArc = anglePerSegment > 180 ? 1 : 0;
                const pathData = `M ${center} ${center} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;

                svgContent += `<path d="${pathData}" fill="${items[i].color}" stroke="var(--bg-secondary)" stroke-width="2"/>`;

                // 文字位置：扇形中心偏外
                const textAngle = (startAngle + endAngle) / 2;
                const textRad = (textAngle * Math.PI) / 180;
                const textRadius = radius * 0.65;
                const tx = center + textRadius * Math.cos(textRad);
                const ty = center + textRadius * Math.sin(textRad);

                svgContent += `
                    <text x="${tx}" y="${ty - 8}" text-anchor="middle" fill="white" font-size="22" font-weight="bold" style="text-shadow: 0 1px 3px rgba(0,0,0,0.5);">${items[i].emoji}</text>
                    <text x="${tx}" y="${ty + 14}" text-anchor="middle" fill="white" font-size="12" font-weight="600" style="text-shadow: 0 1px 3px rgba(0,0,0,0.5);">${items[i].name}</text>
                `;
            }

            svgContent += '</svg>';
            wheel.innerHTML = svgContent;
            renderPrizeList();
        }

        let isSpinning = false;
        let currentRotation = 0;

        function getRemainingSpins() {
            const base = state.spinBaseUsed ? 0 : 1;
            const bonus = state.spinBonusCount - state.spinBonusUsed;
            return { base, bonus, total: base + Math.max(0, bonus) };
        }

        function updateSpinDisplay() {
            const { base, bonus } = getRemainingSpins();
            document.getElementById('spinCountBase').textContent = base;
            document.getElementById('spinCountBonus').textContent = Math.max(0, bonus);

            const btn = document.getElementById('spinBtn');
            const total = base + Math.max(0, bonus);
            btn.disabled = total <= 0 || isSpinning;
            if (total <= 0) {
                btn.textContent = '今日次数已用完';
            } else {
                btn.textContent = `开始抽奖 (剩余 ${total} 次)`;
            }
        }

        function spinWheel() {
            if (isSpinning) return;
            const { base, bonus, total } = getRemainingSpins();
            if (total <= 0) {
                showModal('😅', '次数已用完', '明天再来吧，或者先打卡获得额外次数！');
                return;
            }

            isSpinning = true;

            if (base > 0) {
                state.spinBaseUsed = true;
                Storage.set('spinBaseUsed', true);
            } else {
                state.spinBonusUsed++;
                Storage.set('spinBonusUsed', state.spinBonusUsed);
            }
            updateSpinDisplay();

            const wheel = document.getElementById('wheel');
            const items = state.wheelItems;
            const count = items.length;
            const anglePerSegment = 360 / count;

            const randomIndex = Math.floor(Math.random() * count);
            // 让 randomIndex 的扇形中心对准顶部指针
            // 扇形 i 的中心角度 = i * anglePerSegment - 90 + anglePerSegment/2
            // 要让它对准顶部(-90度)，需要旋转 -(i * anglePerSegment + anglePerSegment/2)
            const targetAngle = -(randomIndex * anglePerSegment + anglePerSegment / 2);
            const spins = 5 + Math.floor(Math.random() * 3);
            currentRotation += spins * 360 + targetAngle - (currentRotation % 360);

            wheel.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const prize = items[randomIndex];
                state.prizes.unshift({
                    name: prize.name,
                    emoji: prize.emoji,
                    color: prize.color,
                    date: new Date().toLocaleString('zh-CN')
                });
                Storage.set('prizes', state.prizes);
                renderPrizeList();
                updateSpinDisplay();
                showModal(prize.emoji, `获得：${prize.name}`, '运气不错！继续打卡获得更多机会~');
            }, 5000);
        }

        function renderPrizeList() {
            const container = document.getElementById('prizeList');
            if (state.prizes.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">暂无记录，快去抽奖吧！</div>';
                return;
            }
            container.innerHTML = state.prizes.slice(0, 10).map(p => `
                <div class="prize-item">
                    <span style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:18px;">${p.emoji}</span>
                        <span style="color:${p.color};font-weight:600;">${p.name}</span>
                    </span>
                    <span style="color: var(--text-muted); font-size: 12px;">${p.date}</span>
                </div>
            `).join('');
        }

        // ==================== 自定义转盘内容 ====================
        function renderWheelConfig() {
            const container = document.getElementById('wheelItemsList');
            container.innerHTML = state.wheelItems.map((item, i) => `
                <div class="wheel-item-row">
                    <span class="item-emoji" onclick="changeWheelEmoji(${i}, this)">${item.emoji}</span>
                    <input type="text" value="${item.name}" onchange="updateWheelItemName(${i}, this.value)" maxlength="12">
                    <div class="item-color" style="background:${item.color}" onclick="showColorPicker(${i}, this)"></div>
                    <button class="item-remove" onclick="removeWheelItem(${i})">×</button>
                </div>
            `).join('');
        }

        function addWheelItem() {
            if (state.wheelItems.length >= 12) {
                showModal('⚠️', '最多12个奖项', '请删除一些再添加');
                return;
            }
            const randomColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            state.wheelItems.push({
                name: '新奖项',
                emoji: '✨',
                color: randomColor
            });
            Storage.set('wheelItems', state.wheelItems);
            renderWheelConfig();
            initWheel();
        }

        function removeWheelItem(index) {
            if (state.wheelItems.length <= 2) {
                showModal('⚠️', '至少保留2个', '转盘需要至少2个奖项');
                return;
            }
            state.wheelItems.splice(index, 1);
            Storage.set('wheelItems', state.wheelItems);
            renderWheelConfig();
            initWheel();
        }

        function updateWheelItemName(index, name) {
            state.wheelItems[index].name = name.trim() || '未命名';
            Storage.set('wheelItems', state.wheelItems);
            initWheel();
        }

        function changeWheelEmoji(index, el) {
            const emojis = ['⭐','🌟','💪','🎁','👑','💎','🍀','🔥','✨','🎉','❤️','🌈','🎵','📱','🍕','🎮','🏆','🎊'];
            const current = state.wheelItems[index].emoji;
            const currentIdx = emojis.indexOf(current);
            const nextIdx = (currentIdx + 1) % emojis.length;
            state.wheelItems[index].emoji = emojis[nextIdx];
            Storage.set('wheelItems', state.wheelItems);
            el.textContent = emojis[nextIdx];
            initWheel();
        }

        let activeColorPicker = null;

        function showColorPicker(index, el) {
            if (activeColorPicker) {
                activeColorPicker.remove();
                activeColorPicker = null;
            }

            const picker = document.createElement('div');
            picker.className = 'color-picker-popover';
            picker.innerHTML = colorPalette.map(c => `
                <div class="color-option" style="background:${c}" onclick="setWheelColor(${index}, '${c}')"></div>
            `).join('');

            const rect = el.getBoundingClientRect();
            picker.style.left = rect.left + 'px';
            picker.style.top = (rect.bottom + 8) + 'px';
            document.body.appendChild(picker);
            activeColorPicker = picker;

            setTimeout(() => {
                document.addEventListener('click', function closePicker(e) {
                    if (!picker.contains(e.target) && e.target !== el) {
                        picker.remove();
                        activeColorPicker = null;
                        document.removeEventListener('click', closePicker);
                    }
                });
            }, 10);
        }

        function setWheelColor(index, color) {
            state.wheelItems[index].color = color;
            Storage.set('wheelItems', state.wheelItems);
            renderWheelConfig();
            initWheel();
            if (activeColorPicker) {
                activeColorPicker.remove();
                activeColorPicker = null;
            }
        }

        // ==================== 日历功能 ====================
        let currentCalendarDate = new Date();

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            document.getElementById('calendarMonth').textContent = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const container = document.getElementById('calendarDays');
            let html = '';

            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month"><span class="day-number">${day}</span></div>`;
            }

            const today = new Date();
            const todayStr = getTodayStr();

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                const isChecked = state.checkins[dateStr];
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isChecked) classes += ' checked';
                html += `<div class="${classes}" onclick="showDayDetail('${dateStr}')"><span class="day-number">${day}</span></div>`;
            }

            const remainingCells = 42 - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day other-month"><span class="day-number">${day}</span></div>`;
            }

            container.innerHTML = html;
        }

        function changeMonth(delta) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta);
            renderCalendar();
        }

        function goToToday() {
            currentCalendarDate = new Date();
            renderCalendar();
        }

        function showDayDetail(dateStr) {
            const checkin = state.checkins[dateStr];
            if (checkin) {
                const date = new Date(dateStr);
                showModal('📅', date.toLocaleDateString('zh-CN'), '当日已完成打卡');
            }
        }

        // ==================== 添加习惯 ====================
        function renderEmojiPicker() {
            const container = document.getElementById('emojiPicker');
            container.innerHTML = emojis.map((emoji, i) => `
                <div class="emoji-option ${i === 0 ? 'selected' : ''}" onclick="selectEmoji(this, '${emoji}')">${emoji}</div>
            `).join('');
        }

        let selectedEmoji = '✨';
        function selectEmoji(el, emoji) {
            document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedEmoji = emoji;
        }

        function showAddHabitModal() {
            document.getElementById('addHabitModal').classList.add('show');
            document.getElementById('newHabitName').value = '';
            document.getElementById('newHabitName').focus();
        }

        function closeAddHabitModal() {
            document.getElementById('addHabitModal').classList.remove('show');
        }

        function addHabit() {
            const name = document.getElementById('newHabitName').value.trim();
            if (!name) {
                showModal('⚠️', '请输入习惯名称', '');
                return;
            }
            const newHabit = {
                id: Date.now(),
                name: name,
                icon: selectedEmoji,
                checked: false
            };
            state.habits.push(newHabit);
            Storage.set('habits', state.habits);
            renderHabits();
            closeAddHabitModal();
            showModal('✅', '添加成功', `已添加习惯：${name}`);
        }

        // ==================== 弹窗 ====================
        function showModal(icon, title, text) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // ==================== 特效 ====================
        function createConfetti() {
            const colors = ['#ff3a3a', '#ff6b6b', '#4caf50', '#ff9800', '#2196f3', '#9c27b0'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                document.body.appendChild(confetti);

                const duration = Math.random() * 3 + 2;
                confetti.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(${window.innerHeight}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => confetti.remove();
            }
        }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay && overlay.id === 'modal') closeModal();
                else if (e.target === overlay && overlay.id === 'addHabitModal') closeAddHabitModal();
            });
        });

        document.getElementById('newHabitName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addHabit();
        });

        init();
    </script>
</body>
</html>
